<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raksha Pratibha Sangram - Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/landing.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="logo-header">
        <div class="header-left">
            <img src="images/mha_logo.png" alt="MHA Logo" class="header-logo">
        </div>
        <div class="header-center">
            <img src="images/rru_logo.png" alt="RRU Logo" class="header-logo main-logo">
        </div>
        <div class="header-right">
            <img src="images/edge_club_logo.png" alt="Edge Club Logo" class="header-logo edge-logo">
        </div>
    </header>

    <div class="landing-container">
        <div class="brand-section">
            <h1>Raksha Pratibha Sangram</h1>
            <p>Smart Quiz & Assessment Management System</p>
        </div>

        <div class="portal-grid">
            <a href="student-login.html" class="portal-card">
                <div class="icon-box">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h2>Student Portal</h2>
                <p>Access your exam console, check schedules, and participate in live assessments.</p>
            </a>

            <a href="admin-login.html" class="portal-card">
                <div class="icon-box">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2>Admin Console</h2>
                <p>Manage questions, monitor student progress, and configure exam parameters.</p>
            </a>
        </div>
    </div>
</body>
</html>
